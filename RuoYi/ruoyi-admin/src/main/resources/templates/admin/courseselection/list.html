<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('选课记录列表')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="cs-form">
                    <div class="select-list">
                        <ul>
                            <li>学号：<input type="text" name="sno"/></li>
                            <li>课程号：<input type="text" name="cno"/></li>
                            <li>学期：<input type="text" name="semester"/></li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="admin:courseselection:remove"><i class="fa fa-remove"></i> 删除</a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('admin:courseselection:edit')}]];
        var removeFlag = [[${@permission.hasPermi('admin:courseselection:remove')}]];
        var prefix = ctx + "admin/courseselection";
        $(function() {
            var options = {
                url: prefix + "/list",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                modalName: "选课记录",
                uniqueId: "id",
                columns: [
                    {checkbox: true},
                    {field: 'sno', title: '学号'},
                    {field: 'sname', title: '学生姓名'},
                    {field: 'cno', title: '课程号'},
                    {field: 'cname', title: '课程名'},
                    {field: 'semester', title: '学期'},
                    {field: 'normalScore', title: '平时成绩'},
                    {field: 'testScore', title: '考试成绩'},
                    {title: '操作', align: 'center', formatter: function(value, row) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.sno + '/' + row.cno + '\')"><i class="fa fa-edit"></i>编辑成绩</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.sno + ',' + row.cno + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }}
                ]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
