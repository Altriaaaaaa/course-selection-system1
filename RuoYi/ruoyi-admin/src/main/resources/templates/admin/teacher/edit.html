<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改教师')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-teacher-edit" th:object="${teacher}">
            <input name="tno" type="hidden" th:field="*{tno}"/>
            <div class="form-group">
                <label class="col-sm-3 control-label">教师号：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" th:field="*{tno}" disabled>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">姓名：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="tname" th:field="*{tname}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">性别：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="sex">
                        <option value="男" th:selected="*{sex == '男'}">男</option>
                        <option value="女" th:selected="*{sex == '女'}">女</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">出生日期：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="birth" th:field="*{birth}" placeholder="yyyy-MM-dd">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">职称：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="rank" th:field="*{rank}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">薪资：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="salary" th:field="*{salary}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属院系：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="deptId" required>
                        <option th:each="d:${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${d.deptId == teacher.deptId}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">密码：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="password" name="passwordHash" placeholder="留空则不修改密码">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="status">
                        <option value="1" th:selected="*{status == 1}">正常</option>
                        <option value="0" th:selected="*{status == 0}">停用</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/teacher";

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-teacher-edit').serialize());
            }
        }
    </script>
</body>
</html>
