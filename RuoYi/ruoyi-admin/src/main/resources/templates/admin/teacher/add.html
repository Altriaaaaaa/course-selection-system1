<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增教师')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-teacher-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">教师号：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="tno" id="tno" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">姓名：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="tname" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">性别：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="sex">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">出生日期：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="birth" placeholder="yyyy-MM-dd">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">职称：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="rank">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">薪资：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="salary">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属院系：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="deptId" required>
                        <option value="">请选择院系</option>
                        <option th:each="d:${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">密码：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="password" name="passwordHash" id="password" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="status">
                        <option value="1">正常</option>
                        <option value="0">停用</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/teacher";

        $("#form-teacher-add").validate({
            onkeyup: false,
            rules: {
                tno: {
                    remote: {
                        url: ctx + "admin/teacher/checkTnoUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "tno": function() {
                                return $.common.trim($("#tno").val());
                            }
                        }
                    }
                }
            },
            messages: {
                "tno": {
                    remote: "教师号已经存在"
                }
            },
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-teacher-add').serialize());
            }
        }
    </script>
</body>
</html>
