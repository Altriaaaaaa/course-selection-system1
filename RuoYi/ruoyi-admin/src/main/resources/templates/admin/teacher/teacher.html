<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('教师列表')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="teacher-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                教师号：<input type="text" name="tno"/>
                            </li>
                            <li>
                                姓名：<input type="text" name="tname"/>
                            </li>
                            <li>
                                院系：<select name="deptId" th:with="departments=${@departmentService.selectDepartmentList(null)}">
                                    <option value="">全部</option>
                                    <option th:each="d:${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="admin:teacher:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="admin:teacher:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="admin:teacher:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('admin:teacher:edit')}]];
        var removeFlag = [[${@permission.hasPermi('admin:teacher:remove')}]];
        var prefix = ctx + "admin/teacher";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                modalName: "教师",
                uniqueId: "tno",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'tno',
                    title: '教师号'
                },
                {
                    field: 'tname',
                    title: '姓名'
                },
                {
                    field: 'sex',
                    title: '性别',
                    formatter: function(value) {
                        return value;
                    }
                },
                {
                    field: 'birth',
                    title: '出生日期',
                    formatter: function(value) {
                        return value ? value.substring(0, 10) : '';
                    }
                },
                {
                    field: 'rank',
                    title: '职称'
                },
                {
                    field: 'salary',
                    title: '薪资'
                },
                {
                    field: 'deptName',
                    title: '所属院系'
                },
                {
                    field: 'status',
                    title: '状态',
                    formatter: function(value) {
                        if (value == 0) {
                            return '<span class="label label-danger">停用</span>';
                        } else if (value == 1) {
                            return '<span class="label label-primary">正常</span>';
                        }
                        return value;
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.tno + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.tno + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
