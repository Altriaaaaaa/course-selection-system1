<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改院系')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-department-edit" th:object="${department}">
            <input name="deptId" type="hidden" th:field="*{deptId}"/>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">院系名称：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="deptName" id="deptName" th:field="*{deptName}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">地址：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="address" th:field="*{address}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">电话：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="phoneCode" th:field="*{phoneCode}">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/department";

        $("#form-department-edit").validate({
            onkeyup: false,
            rules: {
                deptName: {
                    remote: {
                        url: ctx + "admin/department/checkDeptNameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "deptId": function() {
                                return $("input[name='deptId']").val();
                            },
                            "deptName": function() {
                                return $.common.trim($("#deptName").val());
                            }
                        }
                    }
                }
            },
            messages: {
                "deptName": {
                    remote: "院系名称已经存在"
                }
            },
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-department-edit').serialize());
            }
        }
    </script>
</body>
</html>
