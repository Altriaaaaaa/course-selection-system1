<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改课程')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-course-edit" th:object="${course}">
            <input name="cno" type="hidden" th:field="*{cno}"/>
            <div class="form-group">
                <label class="col-sm-3 control-label">课程号：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" th:field="*{cno}" disabled>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程名：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="cname" th:field="*{cname}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学分：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="credit" th:field="*{credit}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学时：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="hours" th:field="*{hours}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程类型：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="courseType" required>
                        <option value="0" th:selected="*{courseType == 0}">必修</option>
                        <option value="1" th:selected="*{courseType == 1}">选修</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">开课院系：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="deptId" required>
                        <option th:each="d:${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${d.deptId == course.deptId}"></option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/course";

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-course-edit').serialize());
            }
        }
    </script>
</body>
</html>
