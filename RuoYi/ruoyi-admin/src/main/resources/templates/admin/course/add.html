<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增课程')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-course-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程号：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="cno" id="cno" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程名：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="cname" id="cname" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学分：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="credit" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学时：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="hours" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程类型：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="courseType" required>
                        <option value="0">必修</option>
                        <option value="1">选修</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">开课院系：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="deptId" required>
                        <option value="">请选择院系</option>
                        <option th:each="d:${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/course";

        $("#form-course-add").validate({
            onkeyup: false,
            rules: {
                cno: {
                    remote: {
                        url: ctx + "admin/course/checkCnoUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "cno": function() { return $.common.trim($("#cno").val()); }
                        }
                    }
                },
                cname: {
                    remote: {
                        url: ctx + "admin/course/checkCnameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "cname": function() { return $.common.trim($("#cname").val()); }
                        }
                    }
                }
            },
            messages: {
                "cno": { remote: "课程号已经存在" },
                "cname": { remote: "课程名已经存在" }
            },
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-course-add').serialize());
            }
        }
    </script>
</body>
</html>
