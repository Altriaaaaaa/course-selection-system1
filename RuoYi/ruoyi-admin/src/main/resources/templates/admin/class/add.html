<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增授课')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-class-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">教师：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="tno" required>
                        <option value="">请选择教师</option>
                        <option th:each="t:${teachers}" th:value="${t.tno}" th:text="${t.tno} + ' - ' + ${t.tname}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">课程：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="cno" required>
                        <option value="">请选择课程</option>
                        <option th:each="c:${courses}" th:value="${c.cno}" th:text="${c.cno} + ' - ' + ${c.cname}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学期：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="semester" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">上课时间：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="classTime">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/class";
        function submitHandler() {
            if ($.validate.form()) { $.operate.save(prefix + "/add", $('#form-class-add').serialize()); }
        }
    </script>
</body>
</html>
