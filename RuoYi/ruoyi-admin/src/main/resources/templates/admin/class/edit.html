<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改授课')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-class-edit" th:object="${class}">
            <div class="form-group">
                <label class="col-sm-3 control-label">教师：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="tno" th:value="${class.tno}">
                    <select class="form-control" disabled>
                        <option th:each="t:${teachers}" th:value="${t.tno}" th:text="${t.tno} + ' - ' + ${t.tname}" th:selected="${t.tno == class.tno}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">课程：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="cno" th:value="${class.cno}">
                    <select class="form-control" disabled>
                        <option th:each="c:${courses}" th:value="${c.cno}" th:text="${c.cno} + ' - ' + ${c.cname}" th:selected="${c.cno == class.cno}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">学期：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="semester" th:field="*{semester}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">上课时间：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="classTime" th:field="*{classTime}">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "admin/class";
        function submitHandler() {
            if ($.validate.form()) { $.operate.save(prefix + "/edit", $('#form-class-edit').serialize()); }
        }
    </script>
</body>
</html>
